name: Release world zips

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  zip-worlds:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Zip world folders
        run: |
          mkdir -p dist
          for dir in */; do
            name="${dir%/}"
            if [ -f "$name/stack.md" ]; then
              zip -r "dist/$name.zip" "$name/"
              echo "Zipped: $name"
            fi
          done

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! ls dist/*.zip 1>/dev/null 2>&1; then
            echo "No world zips found — skipping upload."
            exit 0
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          gh release upload "$TAG" dist/*.zip --clobber

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RELEASE_NAME: ${{ github.event.release.name || 'v0.3.0 — Sønderjysk Kaffebord' }}
          RELEASE_URL: ${{ github.event.release.html_url || 'https://github.com/ChBrain/KAIWorlds/releases/tag/v0.3.0' }}
          RELEASE_TAG: ${{ github.event.release.tag_name || 'v0.3.0' }}
          RELEASE_BODY: ${{ github.event.release.body || '' }}
        run: |
          python3 << 'EOF'
          import os, json, urllib.request, re, glob

          webhook = os.environ.get('DISCORD_WEBHOOK', '')
          if not webhook:
              print('No DISCORD_WEBHOOK secret — skipping.')
              exit(0)

          name = os.environ['RELEASE_NAME']
          url  = os.environ['RELEASE_URL']
          tag  = os.environ['RELEASE_TAG']
          body = os.environ.get('RELEASE_BODY', '')

          # "v0.1.0 — Late Night Radio" → "Late Night Radio"
          world = name.split(' \u2014 ', 1)[-1] if ' \u2014 ' in name else name

          # First bold line of body: "**World** — tagline"
          m = re.search(r'\*\*[^*]+\*\*\s*\u2014\s*(.+)', body)
          tagline = m.group(1).strip() if m else ''

          # Download links for each zipped world
          zips = sorted(glob.glob('dist/*.zip'))
          zip_links = '  '.join(
              f'[{os.path.splitext(os.path.basename(z))[0].replace("_", " ").title()} \u2193](https://github.com/ChBrain/KAIWorlds/releases/download/{tag}/{os.path.basename(z)})'
              for z in zips
          )

          desc = (tagline + '\n\n' + zip_links).strip()

          payload = {
              'embeds': [{
                  'title': world,
                  'url': url,
                  'description': desc,
                  'color': 0x5865F2,
                  'footer': {'text': f'KAI Worlds \u00b7 {tag}'}
              }]
          }
          data = json.dumps(payload).encode()
          req = urllib.request.Request(webhook, data=data, headers={'Content-Type': 'application/json'})
          try:
              urllib.request.urlopen(req)
              print('Discord notification sent.')
          except urllib.error.HTTPError as e:
              print(f'HTTP {e.code}: {e.reason}')
              print(e.read().decode())
              raise
          EOF

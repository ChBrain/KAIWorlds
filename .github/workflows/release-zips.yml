name: Release world zips

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  zip-worlds:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Zip world folders
        run: |
          mkdir -p dist
          for dir in */; do
            name="${dir%/}"
            if [ -f "$name/stack.md" ]; then
              zip -r "dist/$name.zip" "$name/"
              echo "Zipped: $name"
            fi
          done

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! ls dist/*.zip 1>/dev/null 2>&1; then
            echo "No world zips found — skipping upload."
            exit 0
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          gh release upload "$TAG" dist/*.zip --clobber

      - name: Prepare Discord embed
        if: github.event_name == 'release'
        env:
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          python3 << 'EOF'
          import os, re, glob

          name = os.environ['RELEASE_NAME']
          tag  = os.environ['RELEASE_TAG']
          body = os.environ.get('RELEASE_BODY', '')

          world = name.split(' \u2014 ', 1)[-1] if ' \u2014 ' in name else name

          m = re.search(r'\*\*[^*]+\*\*\s*\u2014\s*(.+)', body)
          tagline = m.group(1).strip() if m else ''

          zips = sorted(glob.glob('dist/*.zip'))
          zip_links = '  '.join(
              f'[{os.path.splitext(os.path.basename(z))[0].replace("_", " ").title()} \u2193](https://github.com/ChBrain/KAIWorlds/releases/download/{tag}/{os.path.basename(z)})'
              for z in zips
          )

          desc = (tagline + '\n\n' + zip_links).strip()

          env_file = os.environ['GITHUB_ENV']
          with open(env_file, 'a') as f:
              f.write(f'DISCORD_TITLE={world}\n')
              f.write(f'DISCORD_DESC<<EOF_DESC\n{desc}\nEOF_DESC\n')
          EOF

      - name: Notify Discord
        if: github.event_name == 'release'
        uses: sarisia/action-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          nodetail: true
          title: ${{ env.DISCORD_TITLE }}
          description: ${{ env.DISCORD_DESC }}
          url: ${{ github.event.release.html_url }}
          color: "0x5865F2"
          footer: "KAI Worlds · ${{ github.event.release.tag_name }}"

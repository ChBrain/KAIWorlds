name: Sync combined_culture to combined_cultures

on:
  push:
    branches:
      - main
    paths:
      - 'combined_culture/**'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout KAIWorlds
        uses: actions/checkout@v4

      - name: Clone combined_cultures repo
        env:
          PAT: ${{ secrets.COMBINED_CULTURES_PUSH_TOKEN }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/ChBrain/combined_cultures.git target

      - name: Copy updated files
        run: |
          rsync -av --delete \
            --exclude='.git/' \
            combined_culture/ target/

      - name: Check for changes
        id: diff
        run: |
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet && git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create branch and open PR
        if: steps.diff.outputs.changed == 'true'
        env:
          PAT: ${{ secrets.COMBINED_CULTURES_PUSH_TOKEN }}
          GH_TOKEN: ${{ secrets.COMBINED_CULTURES_PUSH_TOKEN }}
        run: |
          cd target
          BRANCH="sync/kaiworlds-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add .
          COMMIT_SHA="${{ github.sha }}"
          git commit -m "sync: update from KAIWorlds ${COMMIT_SHA:0:7}"
          git push origin "$BRANCH"
          gh pr create \
            --repo ChBrain/combined_cultures \
            --base main \
            --head "$BRANCH" \
            --title "sync: update from KAIWorlds ${COMMIT_SHA:0:7}" \
            --body "Automated sync from [KAIWorlds@${COMMIT_SHA:0:7}](https://github.com/ChBrain/KAIWorlds/commit/${COMMIT_SHA})."
